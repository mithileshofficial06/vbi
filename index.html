<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Village Bank of India - ATM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="atm-container">
      <div class="atm-screen">
        <div class="atm-header">
          <h1>VILLAGE BANK OF INDIA</h1>
        </div>
        <div id="screen-content" class="screen-content"></div>
        <div class="atm-footer">
          <div class="footer-brand">Secured by Villagebankofindia</div>
          <div class="footer-actions">
            <button class="footer-btn" id="cancel-btn">Cancel Session</button>
            <span class="footer-divider">|</span>
            <button class="footer-btn" id="help-btn">Emergency Help</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
